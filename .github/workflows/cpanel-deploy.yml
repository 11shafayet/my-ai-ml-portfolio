name: Build for cPanel

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Deploy dist to cpanel-deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: cpanel-deploy
          folder: dist
          clean: true